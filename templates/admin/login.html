<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            background:#0b1f3a;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            margin:0;
        }

        .login-box{
            background:white;
            padding:40px;
            border-radius:15px;
            width:350px;
        }

        input{
            width:100%;
            padding:12px;
            margin:10px 0;
            box-sizing:border-box;
        }

        button{
            width:100%;
            padding:12px;
            background:#1e6bff;
            color:white;
            border:none;
            border-radius:8px;
            cursor:pointer;
        }
    </style>
</head>
<body>

<div class="login-box">
    <h2>Admin Login</h2>

    <form method="POST">
        <input type="text" name="username" placeholder="Username">

        <input type="password" name="password" placeholder="Password">

        <button type="submit">Login</button>
    </form>
</div>

</body>
</html>
